            width: 80%;

            padding: 20px;

<body>

        <p>Alan Turing was a pioneer of theoretical computer science and artificial intelligence.</p>
        
        <h3>Major Achievements</h3>
        <ul>
            <li>Cracked the Enigma code.</li>
            <li>Proposed the Turing Machine.</li>
        </ul>
